function Login({onLogin}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [showPass,setShowPass]=useState(false);
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [slide,setSlide]=useState(0);
  const [captionShow,setCaptionShow]=useState(true);

  const slides=[
    {cap:'Villagio Di Trapani',sub:'Balneário Piçarras · SC'},
    {cap:'Residencial Mayorca',sub:'Penha · SC'},
    {cap:'Ilhas De Fiji',sub:'Navegantes · SC'},
  ];
  const imgUrls=[
    'https://images.unsplash.com/photo-1613977257363-707ba9348227?w=1600&q=90',
    'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=1600&q=90',
    'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1600&q=90',
  ];

  React.useEffect(()=>{
    const t=setInterval(()=>{
      setCaptionShow(false);
      setTimeout(()=>{setSlide(s=>(s+1)%3);setCaptionShow(true);},1200);
    },8000);
    return()=>clearInterval(t);
  },[]);

  const doLogin=async()=>{
    if(!email||!pass){setErr('Preencha tudo');return;}
    setLoading(true);
    try{
      const {data,error}=await db.from('corretores').select('*').eq('email',email.trim().toLowerCase()).eq('senha',pass).single();
      if(error||!data){setErr('Dados incorretos');setLoading(false);return;}
      onLogin(data);
    }catch(e){setErr('Erro ao conectar');setLoading(false);}
  };

  const goTo=i=>{setCaptionShow(false);setTimeout(()=>{setSlide(i);setCaptionShow(true);},600);};

  return(
    <div style={{position:'fixed',inset:0,fontFamily:"'Inter',sans-serif",overflow:'hidden'}}>

      {/* Fullscreen Ken Burns images */}
      {imgUrls.map((url,i)=>(
        <div key={i} style={{position:'absolute',inset:0,opacity:slide===i?1:0,transition:'opacity 2.5s ease-in-out',zIndex:0}}>
          <img src={url} key={slide===i?'a'+i:'b'+i}
            style={{width:'100%',height:'100%',objectFit:'cover',display:'block',
              ...(slide===i?{animation:['kb1 10s ease-in-out forwards','kb2 10s ease-in-out forwards','kb3 10s ease-in-out forwards'][i]}:{})}}/>
        </div>
      ))}

      {/* Left gradient for form readability — fades out toward right */}

  const active=mine.filter(l=>!['Fechado','Não Efetivada','Sem Interesse'].includes(l.status));

    {l:isAdmin?'Total Leads':'Meus Leads',v:mine.length,sub:`${active.length} ativos`,col:'#3B82F6'},

              <div style={{flex:1,minWidth:0}}>

                <div style={{fontSize:11,color:'#9aa0a6'}}>{l.interesse||l.origem||'—'}</div>

// PIPELINE
function Pipeline({leads,imoveis,user,isAdmin,setLeads,corretores}){
  const [sel,setSel]=useState(null);
  const [modal,setModal]=useState(null);
  const [editLead,setEditLead]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [busca,setBusca]=useState('');
  const [showAll,setShowAll]=useState(isAdmin);
  const emptyForm={nome:'',telefone:'',email:'',cpf:'',interesse:'',origem:'',corretor_id:user.id,status:'Novo'};
  const [formData,setFormData]=useState(emptyForm);

  const filtered=(showAll?leads:leads.filter(l=>l.corretor_id===user.id))
    .filter(l=>!busca||l.nome?.toLowerCase().includes(busca.toLowerCase()));

  const saveLead=async f=>{
    if(f.id){
      const {data}=await db.from('leads').update(f).eq('id',f.id).select().single();
      if(data)setLeads(p=>p.map(l=>l.id===data.id?data:l));
    }else{
      const {data}=await db.from('leads').insert(f).select().single();
      if(data)setLeads(p=>[data,...p]);
    }
    setModal(null);setEditLead(null);
  };

  const moveLead=async(id,status)=>{
    await db.from('leads').update({status}).eq('id',id);
    setLeads(p=>p.map(l=>l.id===id?{...l,status}:l));setSel(null);
  };

  const deleteLead=async id=>{
    await db.from('leads').delete().eq('id',id);
    setLeads(p=>p.filter(l=>l.id!==id));setConfirm(null);setSel(null);
  };

  const exportCSV=()=>{
    const h=['Nome','Telefone','E-mail','CPF','Interesse','Status','Origem','Data'];
    const r=filtered.map(l=>[l.nome||'',l.telefone||'',l.email||'',l.cpf||'',l.interesse||'',l.status||'',l.origem||'',l.criado_em?new Date(l.criado_em).toLocaleDateString('pt-BR'):'']);
    const csv=[h,...r].map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download='leads_feelz_'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.csv';
    a.click();
  };

  return(
    <div className="fade">
      {confirm&&<Confirm msg={`Excluir lead "${confirm.nome}"?`} onYes={()=>deleteLead(confirm.id)} onNo={()=>setConfirm(null)}/>}
      {modal==='form'&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal-content" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">{editLead?'Editar Lead':'Novo Lead'}</div>
              <button onClick={()=>setModal(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#9aa0a6',display:'flex'}}><Icon n="x" s={18}/></button>
            </div>
            <div className="modal-body">
              <div className="form-group"><label className="form-label">Nome *</label><input className="form-input" value={formData.nome||''} onChange={e=>setFormData({...formData,nome:e.target.value})} placeholder="Nome ou empresa"/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div className="form-group"><label className="form-label">Telefone</label><input className="form-input" value={formData.telefone||''} onChange={e=>setFormData({...formData,telefone:e.target.value})} placeholder="(47) 99999-9999"/></div>
                <div className="form-group"><label className="form-label">E-mail</label><input className="form-input" type="email" value={formData.email||''} onChange={e=>setFormData({...formData,email:e.target.value})} placeholder="email@ex.com"/></div>
              </div>
              <div className="form-group"><label className="form-label">CPF <span style={{fontWeight:400,color:'#9aa0a6'}}>(não obrigatório)</span></label><input className="form-input" value={formData.cpf||''} onChange={e=>setFormData({...formData,cpf:e.target.value})} placeholder="000.000.000-00"/></div>
              <div className="form-group"><label className="form-label">Interesse</label><input className="form-input" value={formData.interesse||''} onChange={e=>setFormData({...formData,interesse:e.target.value})} placeholder="Ex: Studio 42m²"/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div className="form-group"><label className="form-label">Origem</label>
                  <select className="form-input" value={formData.origem||''} onChange={e=>setFormData({...formData,origem:e.target.value})}>
                    <option value="">Selecionar</option>
                    {['Site','Instagram','WhatsApp','Indicação','LinkedIn','Google','Facebook','Evento','Outro'].map(o=><option key={o}>{o}</option>)}
                  </select>
                </div>
                {isAdmin&&<div className="form-group"><label className="form-label">Corretor</label>
                  <select className="form-input" value={formData.corretor_id||user.id} onChange={e=>setFormData({...formData,corretor_id:e.target.value})}>
                    {corretores.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
                  </select>
                </div>}
              </div>
              <div style={{display:'flex',gap:10,marginTop:4}}>
                <button className="btn btn-secondary" onClick={()=>setModal(null)} style={{flex:1,justifyContent:'center'}}>Cancelar</button>
                <button className="btn btn-primary" onClick={()=>formData.nome&&saveLead({...formData,...(editLead?{id:editLead.id}:{})})} style={{flex:2,justifyContent:'center'}}>
                  {editLead?'Salvar':'Adicionar Lead'}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
      <div className="page-header">
        <h1 className="page-title">Pipeline de Leads</h1>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-secondary" onClick={exportCSV}><Icon n="download" s={15}/> CSV</button>
          <button className="btn btn-primary" onClick={()=>{setFormData(emptyForm);setEditLead(null);setModal('form');}}><Icon n="plus" s={15}/> Novo Lead</button>
        </div>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:200}}>
          <div style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#9aa0a6'}}><Icon n="search" s={14}/></div>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar lead..." className="form-input" style={{paddingLeft:34,marginBottom:0}}/>
        </div>
        {isAdmin&&(
          <div style={{display:'flex',gap:6}}>
            {[['Todos',true],['Meus',false]].map(([l,a])=>(
              <button key={l} onClick={()=>setShowAll(a)} style={{padding:'7px 14px',borderRadius:7,border:`1.5px solid ${showAll===a?'#2b9fef':'#e8eaed'}`,background:showAll===a?'rgba(43,159,239,0.08)':'#fff',color:showAll===a?'#2b9fef':'#5f6368',fontSize:13,cursor:'pointer'}}>{l}</button>
            ))}
          </div>
        )}
      </div>
      <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:8}}>
        {ST.map(status=>{
          const col=SC[status]||'#888';
          const sLeads=filtered.filter(l=>l.status===status);
          return(
            <div key={status} className="pipe-col">
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:col}}/>
                  <span style={{fontSize:12,fontWeight:500,color:'#5f6368'}}>{status}</span>
                </div>
                <span style={{fontSize:11,background:'#f1f5f9',color:'#9aa0a6',borderRadius:10,padding:'1px 7px'}}>{sLeads.length}</span>
              </div>
              {sLeads.map(l=>{
                const open=sel===l.id;
                return(
                  <div key={l.id} className="pipe-card" onClick={()=>setSel(open?null:l.id)} style={{borderColor:open?col:'#e8eaed'}}>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.nome}</div>
                    <div style={{fontSize:11,color:'#9aa0a6',marginBottom:open?8:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.interesse||l.origem||'—'}</div>
                    {open&&(
                      <div style={{borderTop:'1px solid #f1f5f9',paddingTop:10,marginTop:4}}>
                        <div style={{display:'flex',gap:6,marginBottom:8}}>
                          <button onClick={e=>{e.stopPropagation();setEditLead(l);setFormData(l);setModal('form');}} className="btn btn-secondary" style={{flex:1,justifyContent:'center',padding:'5px 8px',fontSize:11}}>Editar</button>
                          <button onClick={e=>{e.stopPropagation();setConfirm(l);}} className="btn btn-danger" style={{padding:'5px 8px',fontSize:11}}>Excluir</button>
                        </div>
                        <div style={{fontSize:11,color:'#9aa0a6',marginBottom:6}}>Mover para:</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                          {ST.filter(s=>s!==status).map(s=>(
                            <span key={s} onClick={e=>{e.stopPropagation();moveLead(l.id,s);}}
                              style={{fontSize:10,background:`${SC[s]}12`,color:SC[s],border:`1px solid ${SC[s]}25`,borderRadius:5,padding:'3px 7px',cursor:'pointer'}}>{s}</span>
                          ))}
                        </div>
                        {l.telefone&&<a href={`tel:${l.telefone}`} onClick={e=>e.stopPropagation()} style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'#16A34A',textDecoration:'none',marginTop:8,fontWeight:500}}>
                          <Icon n="ph" s={12} c="#16A34A"/>{l.telefone}
                        </a>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// LIGHTBOX
function Lightbox({url,urls=[],onClose}){
  const [idx,setIdx]=useState(()=>Math.max(0,urls.indexOf(url)));
  const list=urls.length>0?urls:[url];
  const cur=list[idx]||list[0];
  const prev=()=>setIdx(i=>(i-1+list.length)%list.length);
  const next=()=>setIdx(i=>(i+1)%list.length);
  useEffect(()=>{
    const h=e=>{if(e.key==='ArrowLeft')prev();else if(e.key==='ArrowRight')next();else if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);
  const bs={position:'absolute',top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:10,width:44,height:44,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:24,zIndex:1};
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.92)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <button onClick={onClose} style={{position:'absolute',top:16,right:20,background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:8,width:40,height:40,cursor:'pointer',color:'#fff',fontSize:22,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
      {list.length>1&&<button onClick={e=>{e.stopPropagation();prev();}} style={{...bs,left:16}}>‹</button>}
      <img src={cur} onClick={e=>e.stopPropagation()} style={{maxWidth:'85vw',maxHeight:'88vh',objectFit:'contain',borderRadius:8}} loading="lazy"/>
      {list.length>1&&<button onClick={e=>{e.stopPropagation();next();}} style={{...bs,right:16}}>›</button>}
      {list.length>1&&<div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.5)',borderRadius:20,padding:'4px 14px',fontSize:13,color:'rgba(255,255,255,0.7)'}}>{idx+1} / {list.length}</div>}
    </div>
  );
}

// IMÓVEIS
function Imoveis({imoveis,setImoveis,user}){
  const [modal,setModal]=useState(null);
  const [selected,setSelected]=useState(null);
  const [editImovel,setEditImovel]=useState(null);
  const [uploading,setUploading]=useState(false);
  const emptyForm={titulo:'',tipo:'Residencial',preco:'',aluguel:'',localizacao:'',area:'',descricao:'',status:'Disponível',empreendimento:'',foto_url:null,fotos_internas:null,plantas_url:{}};
  const [formData,setFormData]=useState(emptyForm);

  const parseArr=v=>{if(!v)return[];if(Array.isArray(v))return v;try{const p=JSON.parse(v);return Array.isArray(p)?p:[p];}catch(e){return[v];}};
  const parsePlants=v=>{
    if(!v)return{};if(typeof v==='object'&&!Array.isArray(v))return v;
    try{const p=JSON.parse(v);if(Array.isArray(p)){const o={};p.forEach((u,i)=>{if(u)o[`Tipo ${String(i+1).padStart(2,'0')}`]=u;});return o;}return typeof p==='object'?p:{};}catch(e){return{};}
  };

  const uploadImg=async(file,key)=>{
    setUploading(key);
    const ext=file.name.split('.').pop();
    const fn=`img_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const {error}=await db.storage.from('imoveis').upload(fn,file,{upsert:true});
    if(!error){
      const {data:u}=db.storage.from('imoveis').getPublicUrl(fn);
      if(key==='foto_url')setFormData(f=>({...f,foto_url:u.publicUrl}));
      else setFormData(f=>{const a=Array.isArray(f[key])?[...f[key]]:[];a.push(u.publicUrl);return{...f,[key]:a};});
    }else alert('Erro: '+error.message);
    setUploading(false);
  };

  const uploadPlanta=async(file,tipo)=>{
    setUploading('p_'+tipo);
    const ext=file.name.split('.').pop();
    const fn=`planta_${tipo.replace(' ','_')}_${Date.now()}.${ext}`;
    const {error}=await db.storage.from('imoveis').upload(fn,file,{upsert:true});
    if(!error){
      const {data:u}=db.storage.from('imoveis').getPublicUrl(fn);
      setFormData(f=>{const o=f.plantas_url&&typeof f.plantas_url==='object'&&!Array.isArray(f.plantas_url)?{...f.plantas_url}:{};o[tipo]=u.publicUrl;return{...f,plantas_url:o};});
    }else alert('Erro: '+error.message);
    setUploading(false);
  };

  const saveImovel=async data=>{
    const sd={
      titulo:data.titulo,tipo:data.tipo,status:data.status,localizacao:data.localizacao||'',
      area:String(data.area||''),descricao:data.descricao||'',empreendimento:data.empreendimento||'',
      foto_url:data.foto_url||null,preco:Number(data.preco)||0,aluguel:Number(data.aluguel)||0,
      fotos_internas:data.fotos_internas?JSON.stringify(Array.isArray(data.fotos_internas)?data.fotos_internas:[data.fotos_internas]):null,
      plantas_url:data.plantas_url&&typeof data.plantas_url==='object'?JSON.stringify(data.plantas_url):null,
    };
    if(data.id){
      sd.captador_id=data.captador_id||user.id;
      const {data:d,error}=await db.from('imoveis').update(sd).eq('id',data.id).select().single();
      if(error){alert('Erro: '+error.message);return;}
      if(d){setImoveis(p=>p.map(i=>i.id===d.id?d:i));setSelected(d);}
    }else{
      sd.captador_id=user.id;
      const {data:d,error}=await db.from('imoveis').insert(sd).select().single();
      if(error){alert('Erro: '+error.message);return;}
      if(d)setImoveis(p=>[...p,d]);
    }
    setModal(null);setEditImovel(null);
  };

  const deleteImovel=async id=>{
    if(!confirm('Excluir?'))return;
    await db.from('imoveis').delete().eq('id',id);
    setImoveis(p=>p.filter(i=>i.id!==id));setSelected(null);
  };

  const openEdit=im=>{
    setEditImovel(im);
    setFormData({...im,fotos_internas:parseArr(im.fotos_internas),plantas_url:parsePlants(im.plantas_url)});
    setModal('form');
  };

  const tipos10=Array.from({length:10},(_,i)=>`Tipo ${String(i+1).padStart(2,'0')}`);
  const stBadge={Disponível:'#22C55E',Negociando:'#C8912A',Reservado:'#8B5CF6',Vendido:'#EF4444'};

  return(
    <div className="fade" style={{position:'relative'}}>
      <div className="page-header">
        <h1 className="page-title">Imóveis</h1>
        <button className="btn btn-primary" onClick={()=>{setFormData(emptyForm);setEditImovel(null);setModal('form');}}><Icon n="plus" s={15}/> Captar Imóvel</button>
      </div>
      {Array.from(new Set(imoveis.map(im=>im.empreendimento||im.titulo))).map(emp=>{
        const grupo=imoveis.filter(im=>(im.empreendimento||im.titulo)===emp);
        return(
          <div key={emp} style={{marginBottom:32}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
              <h2 style={{fontSize:16,fontWeight:800,color:'#102136'}}>{emp}</h2>
              <div style={{flex:1,height:1,background:'#e8eaed'}}/>
              <span style={{fontSize:12,color:'#9aa0a6'}}>{grupo.length} tipologia{grupo.length>1?'s':''}</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
              {grupo.map(im=>(
                <div key={im.id} onClick={()=>setSelected(im)}
                  style={{cursor:'pointer',borderRadius:14,overflow:'hidden',background:'#fff',boxShadow:'0 2px 8px rgba(0,0,0,0.08)',border:`2px solid ${selected&&selected.id===im.id?'#2b9fef':'transparent'}`,transition:'all .2s'}}>
                  <div style={{height:280,position:'relative',overflow:'hidden',background:'linear-gradient(160deg,#0f1e2b,#1e3347)'}}>
                    {im.foto_url
                      ?<img src={im.foto_url} style={{width:'100%',height:'100%',objectFit:'cover',position:'absolute',top:0,left:0}} loading="lazy"/>
                      :<div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8}}><Icon n="bld" s={40} c="rgba(255,255,255,0.15)"/><div style={{fontSize:11,color:'rgba(255,255,255,0.3)'}}>Sem foto</div></div>}
                    <div style={{position:'absolute',top:10,left:10,background:'rgba(0,0,0,0.5)',backdropFilter:'blur(4px)',borderRadius:6,padding:'3px 10px',fontSize:11,color:'#fff',fontWeight:600}}>{im.tipo}</div>
                    <div style={{position:'absolute',top:10,right:10}}><span style={{background:`${stBadge[im.status]||'#888'}CC`,borderRadius:6,padding:'3px 10px',fontSize:11,color:'#fff',fontWeight:600}}>{im.status}</span></div>
                  </div>
                  <div style={{padding:'14px 16px'}}>
                    <div style={{fontSize:14,fontWeight:700,color:'#102136',marginBottom:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{im.titulo}</div>
                    <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:10}}><Icon n="pin" s={12} c="#9aa0a6"/><span style={{fontSize:12,color:'#9aa0a6',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{im.localizacao}</span></div>
                    <div style={{display:'flex',justifyContent:'space-between'}}>
                      <div><div style={{fontSize:10,color:'#9aa0a6'}}>Venda</div><div style={{fontSize:14,fontWeight:700,color:'#2b9fef'}}>{im.preco?fmt(im.preco):'—'}</div></div>
                      <div style={{textAlign:'right'}}><div style={{fontSize:10,color:'#9aa0a6'}}>Área</div><div style={{fontSize:13,fontWeight:600,color:'#202124'}}>{im.area&&String(im.area)!='0'?`${im.area}m²`:'—'}</div></div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
      {imoveis.length===0&&<div style={{textAlign:'center',padding:'60px 20px',color:'#9aa0a6'}}><Icon n="bld" s={48} c="#e8eaed"/><div style={{marginTop:12,fontSize:14}}>Nenhum imóvel.</div></div>}

      {selected&&<>
        <div onClick={()=>setSelected(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.15)',zIndex:499}}/>
        <DetailPanel selected={selected} onClose={()=>setSelected(null)} onEdit={()=>openEdit(selected)} onDelete={()=>deleteImovel(selected.id)}/>

      {modal==='form'&&(

              <div className="modal-title">{editImovel?'Editar Imóvel':'Captar Imóvel'}</div>
              <button onClick={()=>setModal(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#9aa0a6',display:'flex'}}><Icon n="x" s={18}/></button>

                          <button type="button" onClick={()=>document.getElementById(id).click()} style={{padding:'5px 12px',borderRadius:6,background:uploading===key?'#9aa0a6':'#1a73e8',border:'none',color:'#fff',fontSize:11,fontWeight:600,cursor:'pointer'}}>
                            {uploading===key?'Enviando...':'Escolher'}
                          </button>
                        </div>
                        {imgs.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                          {imgs.map((url,i)=>(
                            <div key={i} style={{position:'relative'}}>
                              <img src={url} style={{width:60,height:60,objectFit:'cover',borderRadius:6,border:'1px solid #e8eaed'}}/>
                              <div onClick={()=>{if(key==='foto_url')setFormData(f=>({...f,foto_url:null}));else setFormData(f=>{const a=(Array.isArray(f[key])?f[key]:[]).filter((_,j)=>j!==i);return{...f,[key]:a.length?a:null};});}} style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:'#d93025',color:'#fff',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>×</div>
                            </div>
                          ))}
                        </div>}
                        <input id={id} type="file" accept="image/*" multiple={multi} style={{display:'none'}} onChange={async e=>{const files=Array.from(e.target.files);for(const f of files)await uploadImg(f,key);}}/>
                      </div>
                    );
                  })}
                  <div style={{border:'1.5px dashed #e8eaed',borderRadius:9,padding:12,background:'#f8f9fa'}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#202124',marginBottom:4}}>📐 Plantas por Tipologia</div>
                    <div style={{fontSize:11,color:'#9aa0a6',marginBottom:10}}>Tipo 01 ao Tipo 10</div>
                    <div style={{display:'flex',flexDirection:'column',gap:7}}>
                      {tipos10.map(tipo=>{
                        const obj=formData.plantas_url&&typeof formData.plantas_url==='object'&&!Array.isArray(formData.plantas_url)?formData.plantas_url:{};
                        const url=obj[tipo];
                        const iid='up-'+tipo.replace(' ','-');
                        return(
                          <div key={tipo} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 10px',background:'#fff',borderRadius:8,border:'1px solid #e8eaed'}}>
                            <div style={{width:44,height:44,borderRadius:6,overflow:'hidden',border:'1px solid #e8eaed',flexShrink:0,background:'#f1f3f4',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}} onClick={()=>document.getElementById(iid).click()}>
                              {url?<img src={url} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<Icon n="plus" s={14} c="#c8d0d8"/>}
                            </div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,fontWeight:600,color:'#202124'}}>{tipo}</div>
                              <div style={{fontSize:11,color:url?'#34a853':'#9aa0a6'}}>{url?'Cadastrada':'Sem planta'}</div>
                            </div>
                            <div style={{display:'flex',gap:5}}>
                              <button type="button" onClick={()=>document.getElementById(iid).click()} style={{padding:'4px 10px',borderRadius:6,background:'#1a73e8',border:'none',color:'#fff',fontSize:11,fontWeight:600,cursor:'pointer'}}>
                                {uploading==='p_'+tipo?'...':url?'Trocar':'Add'}
                              </button>
                              {url&&<button type="button" onClick={()=>{const o={...obj};delete o[tipo];setFormData(f=>({...f,plantas_url:o}));}} style={{padding:'4px 7px',borderRadius:6,background:'#fce8e6',border:'none',color:'#d93025',fontSize:12,fontWeight:700,cursor:'pointer'}}>×</button>}
                            </div>
                            <input id={iid} type="file" accept="image/*" style={{display:'none'}} onChange={async e=>{if(e.target.files[0])await uploadPlanta(e.target.files[0],tipo);}}/>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
              <div className="form-group"><label className="form-label">Descrição</label><textarea className="form-input" rows={3} value={formData.descricao||''} onChange={e=>setFormData({...formData,descricao:e.target.value})} style={{resize:'vertical'}}/></div>
              <div style={{display:'flex',gap:10,marginTop:4}}>
                <button className="btn btn-secondary" onClick={()=>{setModal(null);setEditImovel(null);}} style={{flex:1,justifyContent:'center'}}>Cancelar</button>
                <button className="btn btn-primary" onClick={()=>formData.titulo&&saveImovel({...formData,...(editImovel?{id:editImovel.id,captador_id:editImovel.captador_id}:{})})} style={{flex:2,justifyContent:'center'}}>
                  {editImovel?'Salvar':'Registrar Imóvel'}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// AGENDA
function Agenda({visitas,user,isAdmin}){
  const mine=isAdmin?visitas:visitas.filter(v=>v.corretor_id===user.id);
  const grouped=mine.reduce((a,v)=>{(a[v.data]=a[v.data]||[]).push(v);return a;},{});
  const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return(
    <div className="fade">
      <div className="page-header"><h1 className="page-title">Agenda de Visitas</h1></div>
      {Object.keys(grouped).length===0&&<div style={{textAlign:'center',padding:'60px 20px',color:'#9aa0a6'}}>Nenhuma visita agendada.</div>}
      {Object.keys(grouped).sort().map(date=>{
        const d=new Date(date+'T12:00:00');
        return(
          <div key={date} style={{marginBottom:24}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
              <div style={{background:'rgba(43,159,239,0.08)',border:'1px solid rgba(43,159,239,0.2)',borderRadius:10,padding:'6px 14px',textAlign:'center',flexShrink:0}}>
                <div style={{fontSize:10,color:'#2b9fef',fontWeight:600}}>{DAYS[d.getDay()]}</div>
                <div style={{fontSize:22,fontWeight:700,color:'#2b9fef',lineHeight:1}}>{d.getDate()}</div>
                <div style={{fontSize:10,color:'#9aa0a6'}}>{MONTHS[d.getMonth()]}</div>
              </div>
              <div style={{flex:1,height:1,background:'#e8eaed'}}/>
            </div>
            <div style={{marginLeft:78}}>
              {grouped[date].map(v=>(
                <div key={v.id} className="agenda-card">
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{background:'rgba(43,159,239,0.08)',borderRadius:8,padding:'6px 12px',flexShrink:0,border:'1px solid rgba(43,159,239,0.15)'}}>
                      <div style={{fontSize:17,fontWeight:700,color:'#2b9fef'}}>{v.hora?.slice(0,5)}</div>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:600}}>{v.lead_nome}</div>
                      <div style={{fontSize:12,color:'#9aa0a6',marginTop:2}}>{v.imovel_titulo}</div>
                    </div>
                    <Badge label={v.status||'Pendente'} color={v.status==='Confirmada'?'#22C55E':'#C8912A'}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// TAREFAS
function Tarefas({tarefas,setTarefas,user,isAdmin}){
  const mine=isAdmin?tarefas:tarefas.filter(t=>t.corretor_id===user.id);
  const [showAdd,setShowAdd]=useState(false);
  const [f,setF]=useState({titulo:'',tipo:'Ligação',prioridade:'Média',prazo:'',corretor_id:user.id});
  const PRI={Alta:'#d93025',Média:'#C8912A',Baixa:'#3B82F6'};

  const addTask=async()=>{
    if(!f.titulo)return;
    const {data}=await db.from('tarefas').insert(f).select().single();
    if(data)setTarefas(p=>[...p,data]);
    setF({titulo:'',tipo:'Ligação',prioridade:'Média',prazo:'',corretor_id:user.id});setShowAdd(false);
  };

  const toggleTask=async id=>{
    const t=tarefas.find(x=>x.id===id);if(!t)return;
    await db.from('tarefas').update({concluida:!t.concluida}).eq('id',id);
    setTarefas(p=>p.map(x=>x.id===id?{...x,concluida:!x.concluida}:x));
  };

  const pending=mine.filter(t=>!t.concluida);
  const done=mine.filter(t=>t.concluida);

  return(
    <div className="fade">
      <div className="page-header">
        <h1 className="page-title">Tarefas</h1>
        <button className="btn btn-primary" onClick={()=>setShowAdd(!showAdd)}><Icon n="plus" s={15}/> Nova Tarefa</button>
      </div>
      {showAdd&&(
        <div className="card" style={{padding:18,marginBottom:18}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div style={{gridColumn:'1/-1'}}><label className="form-label">Título *</label><input className="form-input" value={f.titulo} onChange={e=>setF({...f,titulo:e.target.value})} placeholder="Descrição da tarefa"/></div>
            <div><label className="form-label">Tipo</label><select className="form-input" value={f.tipo} onChange={e=>setF({...f,tipo:e.target.value})}>{['Ligação','Reunião','Proposta','Visita','E-mail','Outro'].map(t=><option key={t}>{t}</option>)}</select></div>
            <div><label className="form-label">Prioridade</label><select className="form-input" value={f.prioridade} onChange={e=>setF({...f,prioridade:e.target.value})}>{['Alta','Média','Baixa'].map(p=><option key={p}>{p}</option>)}</select></div>
            <div><label className="form-label">Prazo</label><input className="form-input" type="date" value={f.prazo} onChange={e=>setF({...f,prazo:e.target.value})}/></div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <button className="btn btn-secondary" onClick={()=>setShowAdd(false)} style={{flex:1,justifyContent:'center'}}>Cancelar</button>
            <button className="btn btn-primary" onClick={addTask} style={{flex:1,justifyContent:'center'}}>Salvar</button>
          </div>
        </div>
      )}
      <div style={{marginBottom:24}}>
        <div style={{fontSize:11,color:'#9aa0a6',fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Pendentes ({pending.length})</div>
        {pending.map(t=>{
          const late=t.prazo&&t.prazo<new Date().toISOString().slice(0,10);
          return(
            <div key={t.id} className="card" style={{padding:'12px 16px',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div onClick={()=>toggleTask(t.id)} style={{width:20,height:20,borderRadius:'50%',border:`2px solid ${late?'#d93025':'#e8eaed'}`,cursor:'pointer',flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.titulo}</div>
                  <div style={{fontSize:12,color:'#9aa0a6',marginTop:1}}>{t.tipo}{t.prazo&&<span style={{color:late?'#d93025':'#9aa0a6'}}> · {fmtDate(t.prazo)}</span>}</div>
                </div>
                <span className="badge" style={{background:PRI[t.prioridade]+'18',color:PRI[t.prioridade],border:`1px solid ${PRI[t.prioridade]}30`}}>{t.prioridade}</span>
              </div>
            </div>
          );
        })}
        {pending.length===0&&<div style={{fontSize:13,color:'#9aa0a6',padding:'20px 0',textAlign:'center'}}>Todas concluídas! 🎉</div>}
      </div>
      {done.length>0&&(
        <div>
          <div style={{fontSize:11,color:'#9aa0a6',fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Concluídas ({done.length})</div>
          {done.slice(0,5).map(t=>(
            <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',background:'#f8f9fa',borderRadius:9,border:'1px solid #e8eaed',opacity:.5,marginBottom:6}}>
              <div onClick={()=>toggleTask(t.id)} style={{width:20,height:20,borderRadius:'50%',background:'#dcfce7',border:'2px solid #22C55E',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon n="chk" s={10} c="#22C55E"/></div>
              <span style={{fontSize:13,textDecoration:'line-through',color:'#9aa0a6',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.titulo}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// RELATÓRIOS
function Relatorios({leads,corretores}){
  const stats=corretores.filter(c=>!c.is_admin).map(c=>{
    const ml=leads.filter(l=>l.corretor_id===c.id);
    const mf=ml.filter(l=>l.status==='Fechado');
    const ma=ml.filter(l=>!['Fechado','Não Efetivada','Sem Interesse'].includes(l.status));
    return{c,total:ml.length,fechados:mf.length,ativos:ma.length,pipeline:ma.reduce((s,l)=>s+(l.valor||0),0)};
  }).sort((a,b)=>b.fechados-a.fechados);
  const byStatus=ST.map(s=>({s,count:leads.filter(l=>l.status===s).length,col:SC[s]||'#888'}));
  const max=Math.max(...byStatus.map(x=>x.count),1);
  return(
    <div className="fade">
      <div className="page-header"><h1 className="page-title">Relatórios</h1></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card" style={{padding:20}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:18}}>Desempenho por Corretor</div>
          {stats.map(({c,total,fechados,ativos,pipeline})=>(
            <div key={c.id} style={{padding:'14px 0',borderBottom:'1px solid #f1f5f9'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <Avatar b={c} size={32}/>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{c.nome}</div><div style={{fontSize:12,color:'#9aa0a6'}}>{total} leads</div></div>
                <div style={{textAlign:'right'}}><div style={{fontSize:15,fontWeight:700,color:'#2b9fef'}}>{fmt(pipeline)}</div><div style={{fontSize:11,color:'#9aa0a6'}}>pipeline</div></div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <div style={{flex:1,background:'#f8f9fa',borderRadius:8,padding:'8px',textAlign:'center',border:'1px solid #e8eaed'}}><div style={{fontSize:18,fontWeight:700,color:'#3B82F6'}}>{ativos}</div><div style={{fontSize:10,color:'#9aa0a6',fontWeight:600}}>Ativos</div></div>
                <div style={{flex:1,background:'#f8f9fa',borderRadius:8,padding:'8px',textAlign:'center',border:'1px solid #e8eaed'}}><div style={{fontSize:18,fontWeight:700,color:'#16A34A'}}>{fechados}</div><div style={{fontSize:10,color:'#9aa0a6',fontWeight:600}}>Fechados</div></div>
              </div>
            </div>
          ))}
          {stats.length===0&&<div style={{fontSize:13,color:'#9aa0a6',textAlign:'center',padding:'20px 0'}}>Sem dados.</div>}
        </div>
        <div className="card" style={{padding:20}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:18}}>Leads por Status</div>
          {byStatus.filter(x=>x.count>0).map(({s,count,col})=>(
            <div key={s} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}><span style={{fontSize:13,color:'#5f6368'}}>{s}</span><span style={{fontSize:13,color:col,fontWeight:600}}>{count}</span></div>
              <div style={{height:6,background:'#f1f5f9',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:`${(count/max)*100}%`,background:col,borderRadius:3,transition:'width .6s'}}/></div>
            </div>
          ))}
          {leads.length===0&&<div style={{fontSize:13,color:'#9aa0a6',textAlign:'center',padding:'20px 0'}}>Sem leads.</div>}
        </div>
      </div>
    </div>
  );
}

// APP
function App(){
  const [user,setUser]=useState(null);
  const [sec,setSec]=useState('dashboard');
  const [leads,setLeads]=useState([]);
  const [imoveis,setImoveis]=useState([]);
  const [tarefas,setTarefas]=useState([]);
  const [visitas,setVisitas]=useState([]);
  const [corretores,setCorretores]=useState([]);
  const [loading,setLoading]=useState(false);
  const isAdmin=user?.is_admin||false;

  useEffect(()=>{if(user)loadAll();},[user]);

  const loadAll=async()=>{
    setLoading(true);
    try{
      const [l,im,t,v,c]=await Promise.all([
        db.from('leads').select('*').order('criado_em',{ascending:false}),
        db.from('imoveis').select('*').order('criado_em',{ascending:false}),
        db.from('tarefas').select('*').order('prazo',{ascending:true}),
        db.from('visitas').select('*').order('data',{ascending:true}),
        db.from('corretores').select('*').order('nome'),
      ]);
      setLeads(l.data||[]);setImoveis(im.data||[]);setTarefas(t.data||[]);setVisitas(v.data||[]);setCorretores(c.data||[]);
    }catch(e){console.error(e);}
    setLoading(false);
    document.getElementById('ls')?.remove();
  };

  if(!user)return <Login onLogin={setUser}/>;

  const nav=[
    {id:'dashboard',label:'Dashboard',isDash:true},
    {id:'pipeline',label:'Leads',isLeads:true},
    {id:'imoveis',label:'Imóveis',ic:'bld'},
    {id:'agenda',label:'Agenda',ic:'cal'},
    {id:'tarefas',label:'Tarefas',ic:'task'},
    {id:'relatorios',label:'Relatórios',ic:'chart'},
  ];

  return(
    <div className="app-wrap">
      <div className="sidebar">
        <div className="sidebar-logo-wrap">
          <div className="sidebar-logo"><div className="sidebar-logo-inner">FEELZ</div></div>
        </div>
        <nav>
          {nav.map(item=>(
            <div key={item.id} className={`nav-item${sec===item.id?' active':''}`} onClick={()=>setSec(item.id)}>
              {item.isDash
                ?<div style={{width:18,height:18}} dangerouslySetInnerHTML={{__html:DASH_ICON}}/>
                :item.isLeads
                ?<div style={{width:18,height:18}} dangerouslySetInnerHTML={{__html:LEADS_ICON}}/>
                :<Icon n={item.ic} s={17} c="rgba(255,255,255,0.5)"/>}
              <span>{item.label}</span>
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="user-card">
            {isAdmin
              ?<div style={{width:30,height:30,borderRadius:'50%',background:'rgba(200,145,42,0.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon n="edit" s={13} c="#C8912A"/></div>
              :<Avatar b={user} size={30}/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{isAdmin?'Administrador':user.nome}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,0.35)'}}>{isAdmin?'Acesso total':'Corretor'}</div>
            </div>
          </div>
          <button className="btn-logout" onClick={()=>setUser(null)}><Icon n="out" s={13} c="rgba(255,255,255,0.4)"/> Sair</button>
          <div className="copyright">© 2026 Althoff Group</div>
        </div>
      </div>
      <div className="main-wrap">
        <div className="topbar">
          <div className="topbar-search">
            <Icon n="search" s={14} c="#9aa0a6"/>
            <input placeholder="Pesquisa global..." style={{outline:'none',border:'none',background:'none',fontSize:13,color:'#202124'}}/>
          </div>
          <div className="topbar-by">By AlthoffGroup</div>
          <div className="topbar-user">
            {isAdmin?<Icon n="edit" s={14} c="#C8912A"/>:<Avatar b={user} size={22}/>}
            <span style={{fontSize:13,fontWeight:500,color:'#202124'}}>{isAdmin?'Admin':user.nome?.split(' ')[0]}</span>
          </div>
        </div>
        <div className="content">
          {loading
            ?<div style={{display:'flex',justifyContent:'center',padding:60}}><div style={{width:32,height:32,border:'3px solid #e8eaed',borderTop:'3px solid #2b9fef',borderRadius:'50%',animation:'spin .7s linear infinite'}}/></div>
            :<>
              {sec==='dashboard'&&<Dashboard leads={leads} tarefas={tarefas} visitas={visitas} imoveis={imoveis} user={user} isAdmin={isAdmin} corretores={corretores} setSec={setSec}/>}
              {sec==='pipeline'&&<Pipeline leads={leads} imoveis={imoveis} user={user} isAdmin={isAdmin} setLeads={setLeads} corretores={corretores}/>}
              {sec==='imoveis'&&<Imoveis imoveis={imoveis} setImoveis={setImoveis} user={user}/>}
              {sec==='agenda'&&<Agenda visitas={visitas} user={user} isAdmin={isAdmin}/>}
              {sec==='tarefas'&&<Tarefas tarefas={tarefas} setTarefas={setTarefas} user={user} isAdmin={isAdmin}/>}
              {sec==='relatorios'&&<Relatorios leads={leads} corretores={corretores}/>}
            </>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
setTimeout(()=>{document.getElementById('ls')?.remove();},500);
</script>

</body>
</html>
